<div class="search-page">
  <div class="container">
    <!-- Mobile filter button -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h1 style="color:#1A3C6E;font-size:1.25rem;font-weight:700">실거래가 조회</h1>
      <button class="mobile-filter-btn" id="mobile-filter-btn" onclick="toggleMobileFilter()">
        <i data-lucide="sliders-horizontal"></i>
        필터
      </button>
    </div>

    <div class="search-layout">
      <!-- Filter Sidebar -->
      <aside class="filter-sidebar sidebar-hidden" id="filter-sidebar">
        <div class="filter-header">
          <h3>검색 필터</h3>
          <p>조건을 설정하여 검색하세요</p>
        </div>
        <div class="filter-body">
          <!-- 지역 -->
          <div>
            <div class="filter-label">
              <i data-lucide="map-pin"></i>
              지역 (동)
            </div>
            <select class="filter-select" id="filter-dong">
              <option value="">전체</option>
              <!-- 법정동 옵션은 JavaScript에서 동적으로 로드됩니다 -->
            </select>
          </div>

          <!-- 건물 유형 -->
          <div>
            <div class="filter-label">
              <i data-lucide="building-2"></i>
              건물 유형
            </div>
            <div class="toggle-group">
              <button class="toggle-btn active-blue" id="btn-apt" onclick="setBuildingType('아파트')">아파트</button>
              <button class="toggle-btn" id="btn-multi" onclick="setBuildingType('다세대')">다세대</button>
            </div>
          </div>

          <!-- 거래 유형 -->
          <div>
            <div class="filter-label">
              <i data-lucide="handshake"></i>
              거래 유형
            </div>
            <div class="toggle-group">
              <button class="toggle-btn active-navy" id="btn-sale" onclick="setTransactionType('매매')">매매</button>
              <button class="toggle-btn" id="btn-rent" onclick="setTransactionType('전월세')">전월세</button>
            </div>
          </div>

          <!-- 건축연도 -->
          <div>
            <div class="filter-label">
              <i data-lucide="calendar"></i>
              건축연도
            </div>
            <div class="year-range">
              <input type="number" class="year-input" id="year-start" placeholder="1970" min="1900" max="2026" value="1970" />
              <span style="color:#9ca3af;font-size:0.875rem;flex-shrink:0">~</span>
              <input type="number" class="year-input" id="year-end" placeholder="2026" min="1900" max="2026" value="2026" />
            </div>
          </div>

          <!-- Buttons -->
          <div style="display:flex;flex-direction:column;gap:0.5rem">
            <button class="btn btn-primary btn-full" onclick="applyFilter()">
              <i data-lucide="search"></i>
              검색
            </button>
            <button class="btn btn-ghost btn-full" onclick="resetFilter()">
              <i data-lucide="rotate-ccw"></i>
              초기화
            </button>
          </div>
        </div>
      </aside>

      <!-- Results Panel -->
      <div class="results-panel">
        <!-- Map placeholder -->
        <div class="map-placeholder-box" style="padding: 0;">
          <div id="map" style="width:100%;height:100%;border-radius:0.75rem"></div>
        </div>

        <!-- Result Table -->
        <div class="result-table-wrap">
          <div class="result-table-header">
            <p>검색 결과 <span id="result-count">0</span>건</p>
            <small id="result-range"></small>
          </div>
          <div class="table-scroll">
            <table id="result-table">
              <thead>
                <tr>
                  <th onclick="setSort('name')">
                    <span class="th-inner">단지명 <i data-lucide="chevrons-up-down" id="sort-icon-name"></i></span>
                  </th>
                  <th onclick="setSort('area')">
                    <span class="th-inner">면적(㎡) <i data-lucide="chevrons-up-down" id="sort-icon-area"></i></span>
                  </th>
                  <th onclick="setSort('floor')">
                    <span class="th-inner">층 <i data-lucide="chevrons-up-down" id="sort-icon-floor"></i></span>
                  </th>
                  <th onclick="setSort('price')">
                    <span class="th-inner">거래금액 <i data-lucide="chevrons-up-down" id="sort-icon-price"></i></span>
                  </th>
                  <th onclick="setSort('date')">
                    <span class="th-inner">거래일 <i data-lucide="chevrons-up-down" id="sort-icon-date"></i></span>
                  </th>
                </tr>
              </thead>
              <tbody id="result-tbody"></tbody>
            </table>
          </div>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Apartment Detail Modal -->
<div class="modal-overlay hidden" id="detail-modal" onclick="handleModalOverlayClick(event)">
  <div class="modal-box modal-box-lg">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid #f3f4f6;flex-shrink:0">
      <div>
        <h2 id="modal-title" style="color:#1A3C6E;font-size:1.125rem;font-weight:700"></h2>
        <p id="modal-subtitle" style="color:#9ca3af;font-size:0.75rem;margin-top:0.125rem"></p>
      </div>
      <button onclick="closeModal()" style="width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;border-radius:0.5rem;border:none;background:none;cursor:pointer;color:#6b7280">
        <i data-lucide="x" style="width:20px;height:20px"></i>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-two-col">
        <div class="modal-img-side">
          <div class="apt-img">
            <img id="modal-img" src="" alt="아파트 이미지" />
          </div>
          <div class="price-highlight" style="margin-top:1rem">
            <p style="color:#9ca3af;font-size:0.6875rem;font-weight:500;margin-bottom:0.25rem">거래금액</p>
            <p id="modal-price" style="color:#1A3C6E;font-size:1.5rem;font-weight:700"></p>
            <p id="modal-date" style="color:#9ca3af;font-size:0.75rem;margin-top:0.25rem"></p>
          </div>
          <button id="fav-btn" onclick="toggleFavorite()" class="btn btn-outline-danger btn-full" style="margin-top:1rem">
            <i data-lucide="heart" id="fav-icon"></i>
            <span id="fav-label">관심지역 추가</span>
          </button>
        </div>
        <div style="flex:1;min-width:0">
          <h3 style="color:#1A3C6E;font-size:0.875rem;font-weight:600;margin-bottom:0.75rem">상세 정보</h3>
          <div class="info-grid" id="modal-info-grid"></div>
        </div>
      </div>
    </div>
  </div>
