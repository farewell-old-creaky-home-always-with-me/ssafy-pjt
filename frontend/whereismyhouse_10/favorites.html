<div class="favorites-page">
  <div class="favorites-wrap">
    <div class="favorites-header">
      <div>
        <h1 style="color:#1A3C6E;font-size:1.375rem;font-weight:700">관심지역</h1>
        <p style="color:#9ca3af;font-size:0.8125rem;margin-top:0.25rem">
          저장된 관심지역 <span style="color:#2D9CDB" id="fav-count">0</span>개
        </p>
      </div>
      <button id="add-toggle-btn" class="btn btn-primary btn-sm" onclick="toggleAddForm()">
        <i data-lucide="plus" id="add-btn-icon"></i>
        <span id="add-btn-text">관심지역 추가</span>
      </button>
    </div>

    <!-- Add form -->
    <div id="add-form-wrap" style="display:none" class="add-form-card">
      <h3 style="color:#1A3C6E;font-size:0.9375rem;font-weight:600;margin-bottom:1rem">새 관심지역 등록</h3>
      <div class="add-form-fields">
        <div style="flex:1">
          <label class="form-label" for="fav-name" style="font-size:0.75rem;margin-bottom:0.375rem;display:block">지역명</label>
          <input id="fav-name" type="text" class="input-plain" placeholder="예: 래미안 퍼스티지" />
        </div>
        <div style="width:13rem">
          <label class="form-label" for="fav-region" style="font-size:0.75rem;margin-bottom:0.375rem;display:block">지역</label>
          <select id="fav-region" class="input-plain" style="cursor:pointer">
            <option>서울특별시 강남구</option>
            <option>서울특별시 서초구</option>
            <option>서울특별시 송파구</option>
            <option>서울특별시 마포구</option>
            <option>서울특별시 용산구</option>
            <option>서울특별시 영등포구</option>
            <option>서울특별시 성동구</option>
            <option>경기도 성남시 분당구</option>
            <option>경기도 수원시 영통구</option>
            <option>부산광역시 해운대구</option>
          </select>
        </div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn btn-navy btn-sm" onclick="handleAdd()" style="white-space:nowrap;height:2.5rem">추가</button>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-bar" id="fav-search-bar" style="display:none">
      <i data-lucide="search"></i>
      <input type="text" id="fav-search" placeholder="지역명으로 검색..." oninput="renderList()" />
    </div>

    <!-- List -->
    <div id="fav-list-container"></div>
  </div>
</div>

<!-- Delete modal -->
<div class="modal-overlay hidden" id="delete-modal">
  <div class="modal-backdrop" onclick="cancelDelete()"></div>
  <div class="modal-box">
    <div style="padding:2rem 1.5rem 0.5rem;text-align:center">
      <div class="confirm-modal-icon"><i data-lucide="alert-triangle"></i></div>
      <h3 style="color:#1A3C6E;font-size:1.125rem;font-weight:700;margin-bottom:0.5rem">관심지역 삭제</h3>
      <p style="color:#9ca3af;font-size:0.8125rem">이 관심지역을 삭제하시겠습니까?</p>
    </div>
    <div style="display:flex;gap:0.75rem;padding:1.5rem">
      <button class="btn btn-ghost btn-full" id="delete-cancel-btn" onclick="cancelDelete()">취소</button>
      <button class="btn btn-danger btn-full" id="delete-confirm-btn" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="./js/favorites-store.js"></script>
<script src="./js/user-store.js"></script>
<script src="./js/shared.js"></script>
<script>
lucide.createIcons();

// 로그인 확인
if (!UserStore.isLoggedIn()) {
  alert('로그인이 필요한 서비스입니다.');
  window.location.href = './login.html';
}

let showAdd = false;
let pendingDeleteId = null;

function toggleAddForm() {
  showAdd = !showAdd;
  document.getElementById('add-form-wrap').style.display = showAdd ? 'block' : 'none';
  document.getElementById('add-btn-icon').setAttribute('data-lucide', showAdd ? 'x' : 'plus');
  document.getElementById('add-btn-text').textContent = showAdd ? '취소' : '관심지역 추가';
  lucide.createIcons({ nodes: [document.getElementById('add-btn-icon')] });
}

function handleAdd() {
  const name = document.getElementById('fav-name').value.trim();
  const region = document.getElementById('fav-region').value;
  if (!name) return;
  FavoritesStore.add({ name, region });
  document.getElementById('fav-name').value = '';
  showAdd = false;
  document.getElementById('add-form-wrap').style.display = 'none';
  document.getElementById('add-btn-icon').setAttribute('data-lucide', 'plus');
  document.getElementById('add-btn-text').textContent = '관심지역 추가';
  lucide.createIcons({ nodes: [document.getElementById('add-btn-icon')] });
  renderList();
  updateFavBadge();
}

function renderList() {
  const query = (document.getElementById('fav-search')?.value || '').toLowerCase();
  const all = FavoritesStore.load();
  const filtered = all.filter(f =>
    f.name.toLowerCase().includes(query) || f.region.toLowerCase().includes(query)
  );

  document.getElementById('fav-count').textContent = all.length;
  document.getElementById('fav-search-bar').style.display = all.length > 0 ? 'block' : 'none';

  const container = document.getElementById('fav-list-container');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i data-lucide="heart"></i></div>
        <p style="color:#1A3C6E;font-size:1rem;font-weight:600;margin-bottom:0.25rem">
          ${query ? '검색 결과가 없습니다' : '등록된 관심지역이 없습니다'}
        </p>
        <p style="color:#9ca3af;font-size:0.8125rem;text-align:center">
          ${query ? '다른 검색어로 시도해 주세요' : '상단의 추가 버튼으로 관심지역을 등록해 보세요'}
        </p>
      </div>`;
    lucide.createIcons({ nodes: [container] });
    return;
  }

  container.innerHTML = `<div class="fav-list">${filtered.map(item => `
    <div class="fav-item">
      <div class="fav-icon"><i data-lucide="map-pin"></i></div>
      <div class="fav-info">
        <p class="fav-name">${escapeHtml(item.name)}</p>
        <div class="fav-meta">
          <span><i data-lucide="map-pin"></i>${escapeHtml(item.region)}</span>
          <span><i data-lucide="calendar"></i>${formatDate(item.addedAt)}</span>
        </div>
      </div>
      <button class="fav-delete-btn" onclick="startDelete('${item.id}')" aria-label="삭제">
        <i data-lucide="trash-2"></i>
      </button>
    </div>
  `).join('')}</div>`;
  lucide.createIcons({ nodes: [container] });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function startDelete(id) {
  pendingDeleteId = id;
  const m = document.getElementById('delete-modal');
  m.classList.remove('hidden');
  requestAnimationFrame(() => m.classList.add('visible'));
  lucide.createIcons({ nodes: [m] });
}

function cancelDelete() {
  const m = document.getElementById('delete-modal');
  m.classList.remove('visible');
  setTimeout(() => m.classList.add('hidden'), 200);
  pendingDeleteId = null;
}

async function confirmDelete() {
  if (!pendingDeleteId) return;
  const btn = document.getElementById('delete-confirm-btn');
  const cancelBtn = document.getElementById('delete-cancel-btn');
  btn.disabled = true; cancelBtn.disabled = true;
  btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> 삭제 중';
  lucide.createIcons({ nodes: [btn] });
  await new Promise(r => setTimeout(r, 400));
  FavoritesStore.remove(pendingDeleteId);
  btn.disabled = false; cancelBtn.disabled = false;
  btn.textContent = '삭제';
  cancelDelete();
  renderList();
  updateFavBadge();
}

renderList();
</script>
</body>
