<div class="commercial-page">
  <div class="commercial-header">
    <div class="container" style="padding-top:0;padding-bottom:0">
      <h1 style="color:#1A3C6E;font-size:1.375rem;font-weight:700">상권 정보</h1>
      <p style="color:#9ca3af;font-size:0.8125rem;margin-top:0.25rem">주변 편의시설 및 상권 정보를 확인하세요</p>
    </div>
  </div>

  <div class="commercial-tabs" id="cat-tabs"></div>

  <div class="map-area">
    <div class="map-placeholder" id="map" style="overflow:hidden;">
      <div class="map-center-icon" id="map-center-hint">
        <div class="icon-wrap"><i data-lucide="map-pin"></i></div>
        <p style="color:rgba(26,60,110,0.6);font-size:0.875rem;font-weight:500">지도 영역 (Kakao / Naver Map API 연동 예정)</p>
      </div>
      <div id="markers-container"></div>
    </div>

    <div class="bottom-sheet collapsed" id="bottom-sheet" style="display:none">
      <button class="sheet-handle" id="sheet-handle" onclick="toggleSheet()" aria-label="시트 토글">
        <i data-lucide="chevron-up"></i>
      </button>
      <div class="sheet-summary">
        <div style="display:flex;align-items:center;gap:0.75rem;min-width:0;flex:1">
          <div class="sheet-shop-icon" id="sheet-icon"></div>
          <div style="min-width:0">
            <p id="sheet-name" style="color:#1A3C6E;font-size:0.9375rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></p>
            <p id="sheet-address" style="color:#9ca3af;font-size:0.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></p>
          </div>
        </div>
        <button class="sheet-close-btn" onclick="closeSheet()"><i data-lucide="x"></i></button>
      </div>
      <div class="sheet-detail">
        <div class="sheet-detail-grid" id="sheet-detail-grid"></div>
      </div>
    </div>
  </div>
</div>
