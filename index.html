<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WhereIsMyHouse AI Navigator</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101312;
      --panel: rgba(13, 19, 17, 0.72);
      --line: rgba(255, 255, 255, 0.16);
      --text: #f4f0e8;
      --muted: #c8c1b4;
      --accent: #78d6a3;
      --accent-strong: #3fbf7f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        linear-gradient(rgba(6, 11, 9, 0.48), rgba(6, 11, 9, 0.72)),
        url("./static/raw/image.png") center / cover no-repeat fixed,
        var(--bg);
    }

    main {
      width: min(720px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 4.4rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
    }

    button {
      width: 100%;
      min-height: 56px;
      border: 0;
      color: #07100b;
      background: var(--accent);
      font: 700 1rem/1.2 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    .track {
      margin-top: 18px;
      color: var(--muted);
      font: 0.95rem/1.5 ui-sans-serif, system-ui, sans-serif;
      min-height: 1.5em;
    }

    audio {
      width: 100%;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>WhereIsMyHouse AI Navigator</h1>
    <p>공공데이터 기반 주거 탐색 프로젝트 페이지입니다.</p>
    <button id="playButton" type="button">BGM 랜덤 재생</button>
    <div class="track" id="trackName" aria-live="polite"></div>
    <audio id="player" controls></audio>
  </main>

  <script>
    const tracks = [
      "Goodbye, Creaking Home_1.mp3",
      "Goodbye, Creaking Home_2.mp3",
      "Goodbye, Creaking Home_3.mp3",
      "Goodbye, Creaking Home_4.mp3",
      "Goodbye, Creaking Home_5.mp3",
      "Goodbye, Creaking Home_6.mp3",
      "Goodbye, Creaking Home_7.mp3",
      "Goodbye, Creaking Home_8.mp3",
      "Goodbye, Creaking Home_9.mp3"
    ];

    const player = document.querySelector("#player");
    const button = document.querySelector("#playButton");
    const trackName = document.querySelector("#trackName");

    function pickTrack() {
      return tracks[Math.floor(Math.random() * tracks.length)];
    }

    async function playRandomTrack() {
      const track = pickTrack();
      player.src = `./static/music/${encodeURIComponent(track)}`;
      trackName.textContent = `Now playing: ${track.replace(".mp3", "")}`;
      await player.play();
    }

    button.addEventListener("click", () => {
      playRandomTrack().catch(() => {
        trackName.textContent = "브라우저가 재생을 막았습니다. 오디오 컨트롤에서 재생을 눌러주세요.";
      });
    });
  </script>
</body>
</html>
