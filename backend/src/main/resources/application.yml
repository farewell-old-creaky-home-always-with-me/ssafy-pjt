spring:
  application:
    name: ssafy-home-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ssafy_home?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:ssafy}
    password: ${DB_PASSWORD:ssafy}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.ssafy.home
  configuration:
    map-underscore-to-camel-case: true

server:
  servlet:
    session:
      timeout: 30m
